<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Gemini Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">◇</div>
      <div class="title">
        <h1>Gemini Chat</h1>
        <p>マルチモーダル対応・ローカルAPIキー方式</p>
      </div>
    </header>

    <section class="settings">
      <label class="label">Gemini API Key</label>
      <div class="api-row">
        <input id="apiKey" type="password" placeholder="APIキーを入力" />
        <button id="saveKeyBtn">保存</button>
        <button id="clearKeyBtn" class="ghost">削除</button>
      </div>
      <p class="hint">※ キーはこのブラウザのローカルストレージにのみ保存されます。</p>
    </section>

    <main class="chat">
      <div id="messages" class="messages"></div>
    </main>

    <footer class="input-area">
      <div class="input-row">
        <textarea id="prompt" rows="2" placeholder="メッセージを入力…"></textarea>
        <div class="side-controls">
          <label class="file-label">
            <input id="imageInput" type="file" accept="image/*" />
            📷
          </label>
          <button id="sendBtn">送信</button>
        </div>
      </div>
      <div id="imagePreview" class="image-preview hidden"></div>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
